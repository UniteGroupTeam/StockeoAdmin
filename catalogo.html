        // Theme Logic
        const iconBtn1 = document.getElementById('theme-icon');
        const iconBtn2 = document.getElementById('theme-icon-mobile');
        const logoHoriz = document.querySelector('.logo-horiz');

        function updateThemeElements(isDark) {
            logoHoriz.src = isDark ? 'https://i.imgur.com/o3NaSvT.png' : 'https://i.imgur.com/ZCSvC1j.png';
            if(iconBtn1) iconBtn1.innerText = isDark ? 'light_mode' : 'dark_mode';
            if(iconBtn2) iconBtn2.innerText = isDark ? 'light_mode' : 'dark_mode';
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeElements(isDark);
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');

        let cart = JSON.parse(localStorage.getItem('uniteCart')) || [];

        const cartTotal = document.getElementById('cart-total');

        function render(cat = 'all', search = '') {
            grid.innerHTML = '';
            const filtered = products.filter(p => (cat === 'all' || p.category === cat) && p.name.toLowerCase().includes(search.toLowerCase()));

            if(filtered.length === 0) document.getElementById('empty-msg').classList.remove('hidden');
            else document.getElementById('empty-msg').classList.add('hidden');

            filtered.forEach((p, idx) => {
                const el = document.createElement('div');
                el.className = 'glass-card p-4 flex flex-col relative group img-reveal';
                el.innerHTML = `
                    ${p.badge ? `<div class="absolute top-4 right-4 bg-textm text-bg-main text-[9px] font-bold px-2 py-1 rounded-full z-20">${p.badge}</div>` : ''}
                    <a href="producto.html?id=${p.id}" class="block group-hover:opacity-90 transition cursor-pointer flex-grow flex flex-col">
                        <div class="aspect-square w-full rounded-xl mb-4 flex items-center justify-center p-4 relative overflow-hidden bg-gbg">

                            <span class="material-symbols-rounded text-[18px]">add</span>
                        </button>
                    </div>
                `;
                grid.appendChild(el);
            });

            gsap.fromTo('.img-reveal', 
                { opacity: 0, y: 20 },
                { opacity: 1, y: 0, duration: 0.5, stagger: 0.05, ease: "power2.out" }
            );
        }

        window.add = (id) => {
            const p = products.find(x => x.id === id);
            cart.push(p);
            save(); renderCart();
            gsap.fromTo([cartCount, cartCountMobile], {scale: 1.5}, {scale: 1, duration: 0.3});
            openCart();
        };

        function save() {
            localStorage.setItem('uniteCart', JSON.stringify(cart));
            cartCount.innerText = cartCountMobile.innerText = cart.length;
            cartCount.classList.toggle('hidden', cart.length === 0);
            cartCountMobile.classList.toggle('hidden', cart.length === 0);
        }

        function renderCart() {
            cartItemsContainer.innerHTML = '';
            let total = 0;
            if(cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="text-center text-textmuted py-10 flex flex-col items-center"><span class="material-symbols-rounded text-4xl mb-2 opacity-50">shopping_cart</span><p>Bolsa vacía</p></div>';
            } else {
                cart.forEach((item, idx) => {
                    total += item.price;
                    const el = document.createElement('div');
                    el.className = 'flex items-center gap-4 bg-gbg p-3 rounded-2xl border border-gborder';
                    el.innerHTML = `
                        <div class="w-16 h-16 bg-main rounded-xl flex items-center justify-center p-2"><img src="${item.img}" class="w-full h-full object-contain"></div>
                        <div class="flex-grow min-w-0">
                            <p class="text-sm font-semibold text-textm truncate">${item.name}</p>
                            <p class="text-xs text-textmuted">$${item.price}</p>
                        </div>
                        <button onclick="remove(${idx})" class="p-2 text-textmuted hover:text-textm transition"><span class="material-symbols-rounded text-[20px]">delete</span></button>
                    `;
                    cartItemsContainer.appendChild(el);
                });
            }
            cartTotal.innerText = `$${total.toLocaleString()}`;
        }

        window.remove = (idx) => { cart.splice(idx, 1); save(); renderCart(); };

        const openCart = () => { 
            cartOverlay.classList.remove('hidden'); 
            setTimeout(() => { 
                cartOverlay.classList.remove('opacity-0'); 
                cartPanel.classList.remove('translate-x-full'); 
            }, 10); 
            renderCart(); 
        };
        
        const closeCartFn = () => {
            cartPanel.classList.add('translate-x-full');
            cartOverlay.classList.add('opacity-0');
            setTimeout(() => cartOverlay.classList.add('hidden'), 300);
        };

        document.getElementById('cart-trigger').addEventListener('click', openCart);

            cart.forEach(p => { msg += `• ${p.name} ($${p.price})\n`; t += p.price; });

            window.open(`https://wa.me/525574123521?text=${encodeURIComponent(msg)}`, '_blank');

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {

            document.querySelectorAll('.pwa-install-btn').forEach(b => {
                b.classList.remove('hidden');
                b.style.display = 'flex';
            });
        });
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.querySelectorAll('.pwa-install-btn').forEach(b => b.classList.add('hidden'));
                    }
                    deferredPrompt = null;
                });
            }
        }

                    menu.classList.remove('flex'); 
                }, 300);
            }
        }
        function openWAGroup() {
            toggleWAMenu();
            const modal = document.getElementById('wa-group-modal');
            const card = document.getElementById('wa-group-card');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); card.classList.remove('scale-95'); }, 10);
        }
        function closeWAGroup() {
            const modal = document.getElementById('wa-group-modal');
            const card = document.getElementById('wa-group-card');
            modal.classList.add('opacity-0'); card.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }
    </script>
</body>
</html>
